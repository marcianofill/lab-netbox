version: '3.4'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netbox_strong_password}
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: sh -c 'redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_strong_password}'
    volumes:
      - netbox-redis-data:/data
    restart: unless-stopped

  netbox:
    image: netboxcommunity/netbox:v3.7
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${POSTGRES_PASSWORD:-netbox_strong_password}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_strong_password}
      SECRET_KEY: ${SECRET_KEY:-super_secret_key_change_me}
      ALLOWED_HOSTS: "*"
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@ispmobi.com.br
      SUPERUSER_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8080"
    volumes:
      - netbox-media-files:/opt/netbox/netbox/media
    restart: unless-stopped

volumes:
  netbox-postgres-data:
  netbox-redis-data:
  netbox-media-files:
